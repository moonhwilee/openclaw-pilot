name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Smoke
        run: npm run smoke

      - name: Pack check
        run: npm pack --dry-run
